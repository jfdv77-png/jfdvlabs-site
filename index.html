<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JFDV Labs — Coming Soon</title>
  <meta name="description" content="JFDV Labs — Independent software studio. Coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10;
      --line: rgba(255,255,255,0.06);
      --accent: #2a5cff;
      --accent2: #4f8ef7;
      --text: #e8ecf4;
      --muted: #6b7a99;
      --dim: #3a4460;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }
    nav {
      position: relative;
      z-index: 1;
      padding: 24px 48px;
      border-bottom: 1px solid var(--line);
    }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent2); }
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 48px;
      overflow: hidden;
    }
    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 12vw, 160px);
      line-height: 0.9;
      letter-spacing: 2px;
      max-width: 900px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
    }
    h1 .slash {
      color: var(--accent);
      display: inline-block;
      transform: skewX(-8deg);
    }
    .sub {
      margin-top: 32px;
      font-size: 16px;
      color: var(--muted);
      max-width: 400px;
      line-height: 1.8;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.6s forwards;
    }
    .badge {
      margin-top: 48px;
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 12px 24px;
      border: 1px solid var(--dim);
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.8s forwards;
    }
    .hero-num {
      position: absolute;
      right: -20px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(200px, 30vw, 380px);
      color: rgba(42,92,255,0.04);
      line-height: 1;
      pointer-events: none;
      user-select: none;
      letter-spacing: -10px;
    }
    footer {
      position: relative;
      z-index: 1;
      padding: 24px 48px;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    footer p {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 1px;
    }
    .footer-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 3px;
      color: var(--dim);
    }
    .footer-logo span { color: var(--accent); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 768px) {
      nav, main, footer { padding-left: 24px; padding-right: 24px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="#" class="nav-logo">JFDV <span>Labs</span></a>
  </nav>
  <main>
    <div class="tag">// jfdvlabs.space</div>
    <h1>DESIGN<br><span class="slash">/</span>BUILD<br>LAUNCH</h1>
    <p class="sub">Independent software studio based in Campania, Italy. Something is coming.</p>
    <div class="badge">Under construction</div>
    <div class="hero-num">JF</div>
  </main>
  <footer>
    <div class="footer-logo">JFDV <span>Labs</span></div>
    <p>© 2026 JFDV Labs · Campania, Italy</p>
    <p>JeyEffe® Registered Trademark</p>
  </footer>
</body>
</html>
